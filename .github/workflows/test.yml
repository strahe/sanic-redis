name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff linter
        run: ruff check sanic_redis/ tests/

      - name: Run ruff formatter
        run: ruff format --check sanic_redis/ tests/

  test:
    runs-on: ubuntu-latest
    name: Python ${{ matrix.python.version }} / ${{ matrix.dependency-profile }}
    strategy:
      matrix:
        python:
          - version: "3.10"
            tox-factor: py310
          - version: "3.11"
            tox-factor: py311
          - version: "3.12"
            tox-factor: py312
          - version: "3.13"
            tox-factor: py313
          - version: "3.14"
            tox-factor: py314
        dependency-profile: ["deps-min", "deps-latest"]

    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python.version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python.version }}

      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install "tox>=4"

      - name: Run tests
        run: |
          tox -e ${{ matrix.python.tox-factor }}-${{ matrix.dependency-profile }}
        env:
          REDIS_URL: redis://localhost:6379
          TEST_REDIS_DB: 15
